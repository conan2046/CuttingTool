  short_description: "Produce UI assets and Unity-ready interactive prefabs"
  default_prompt: "Use $game-ui-asset-pipeline. Resolve only the missing project name, reference placement, and one consolidated screen confirmation; then automatically produce and QA transparent UI assets. When a Unity project is in scope, configure Sprite imports, safely infer or require overrides for 9-slice borders, and generate traceable Image/Button prefabs from an explicit layout."
